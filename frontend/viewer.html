<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="top-bar">
        <div>
          <p class="eyebrow">Viewer</p>
          <h1>Watch stream</h1>
        </div>
        <a class="link-button" href="./index.html">Open streamer</a>
      </section>

      <section class="stream-layout">
        <div class="video-panel">
          <video id="player" controls autoplay playsinline></video>
          <div class="live-badge" id="liveBadge">Waiting</div>
        </div>

        <aside class="control-panel">
          <label class="field">
            <span>Backend server</span>
            <input
              id="serverUrl"
              type="url"
              autocomplete="off"
              placeholder="http://YOUR_VM_IP:8080"
            />
          </label>

          <div class="button-row">
            <button id="watchButton" type="button">Watch</button>
            <button id="reloadButton" class="secondary" type="button">Reload HLS</button>
          </div>

          <dl class="status-list">
            <div>
              <dt>Playback</dt>
              <dd id="playbackStatus">Idle</dd>
            </div>
            <div>
              <dt>Playlist</dt>
              <dd id="playlistUrl">Not loaded</dd>
            </div>
          </dl>
        </aside>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <script src="./viewer.js"></script>
  </body>
</html>
